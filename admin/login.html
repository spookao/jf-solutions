<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | JF Maintenance</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>JF Maintenance</h2>
                <p>Painel de Administração Seguro</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Utilizador</label>
                    <input type="text" id="username" class="form-control" required placeholder="Insira o seu utilizador">
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label for="password">Palavra-passe</label>
                    <input type="password" id="password" class="form-control" required placeholder="Insira a sua palavra-passe">
                </div>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Entrar no Painel
                </button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
